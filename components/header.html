<header class="header">

    <div class="container">

        <div class="row">

            <!-- LOGO -->

            <div class="col-lg-3 col-md-3">

                <div class="header__logo">

                    <a href="./index.html" style="
                        font-size:32px;
                        font-weight:bold;
                        color:black;
                    ">

                        SneakerSepeti

                    </a>

                </div>

            </div>



            <!-- MENU -->

            <div class="col-lg-7 col-md-7">

                <nav class="header__menu mobile-menu">

                    <ul>

                        <li id="menuHome">
                            <a href="./index.html">
                                Ana Sayfa
                            </a>
                        </li>

                        <li id="menuProducts">
                            <a href="./shop.html">
                                Ürünler
                            </a>
                        </li>

                        <li id="menuWomen">
                            <a href="./shop.html?gender=women">
                                Kadın
                            </a>
                        </li>

                        <li id="menuMen">
                            <a href="./shop.html?gender=men">
                                Erkek
                            </a>
                        </li>

                        <li id="menuKids">
                            <a href="./shop.html?gender=kids">
                                Çocuk
                            </a>
                        </li>

                        <li id="menuContact">
                            <a href="./contact.html">
                                İletişim
                            </a>
                        </li>

                    </ul>

                </nav>

            </div>



            <!-- RIGHT -->

            <div class="col-lg-2 col-md-2">

                <div id="headerRight" style="
                    height:100%;
                    display:flex;
                    align-items:center;
                    justify-content:flex-end;
                    gap:18px;
                ">

                    <a href="./login.html" style="
                        font-weight:700;
                        color:black;
                    ">

                        <i class="fa fa-user"></i>
                        Giriş Yap

                    </a>

                </div>

            </div>

        </div>



        <div class="canvas__open">

            <i class="fa fa-bars"></i>

        </div>

    </div>



    <script>

        async function updateHeader() {

            const token =
                localStorage.getItem("token");



            const headerRight =
                document.getElementById("headerRight");



            if (token) {

                try {

                    const response =
                        await fetch(
                            "http://127.0.0.1:8000/api/me",
                            {

                                method: "GET",

                                headers: {

                                    "Authorization":
                                        "Bearer " + token,

                                    "Accept":
                                        "application/json"
                                }

                            }
                        );



                    if (response.status === 401) {

                        localStorage.removeItem("token");

                        window.location.href =
                            "./login.html";

                        return;
                    }



                } catch (error) {

                    localStorage.removeItem("token");

                    window.location.href =
                        "./login.html";

                    return;
                }



                headerRight.innerHTML = `

                <a href="./favorites.html" style="
                    color:black;
                    font-size:22px;
                ">
                    <i class="fa fa-heart-o"></i>
                </a>

                <a href="./cart.html" style="
                    color:black;
                    font-size:22px;
                ">
                    <i class="fa fa-shopping-bag"></i>
                </a>

                <div style="
                    position:relative;
                ">

                    <button
                        id="profileButton"
                        style="
                            width:45px;
                            height:45px;
                            border:none;
                            border-radius:50%;
                            background:black;
                            color:white;
                            font-weight:700;
                            cursor:pointer;
                        "
                    >

                        İ

                    </button>



                    <div
                        id="profileDropdown"
                        style="
                            position:absolute;
                            top:60px;
                            right:-120px;
                            width:220px;
                            background:white;
                            border:1px solid #eee;
                            border-radius:10px;
                            padding:10px 0;
                            display:none;
                            z-index:999;
                            overflow:hidden;
                        "
                    >

                        <a href="./profile.html" style="
                            display:block;
                            padding:12px 20px;
                            color:black;
                        ">
                            Profilim
                        </a>

                        <a href="./orders.html" style="
                            display:block;
                            padding:12px 20px;
                            color:black;
                        ">
                            Siparişlerim
                        </a>

                        <a href="./addresses.html" style="
                            display:block;
                            padding:12px 20px;
                            color:black;
                        ">
                            Adreslerim
                        </a>

                        <a href="./favorites.html" style="
                            display:block;
                            padding:12px 20px;
                            color:black;
                        ">
                            Favorilerim
                        </a>

                        <a href="./cart.html" style="
                            display:block;
                            padding:12px 20px;
                            color:black;
                        ">
                            Sepetim
                        </a>

                        <a href="./wallet.html" style="
                            display:block;
                            padding:12px 20px;
                            color:black;
                        ">
                            Cüzdanım
                        </a>

                        <button
                            onclick="logout()"
                            style="
                                width:100%;
                                border:none;
                                background:none;
                                text-align:left;
                                padding:12px 20px;
                                color:red;
                                cursor:pointer;
                            "
                        >

                            Çıkış Yap

                        </button>

                    </div>

                </div>

            `;



                const profileButton =
                    document.getElementById("profileButton");



                const profileDropdown =
                    document.getElementById("profileDropdown");



                profileButton.addEventListener("click", function () {

                    if (profileDropdown.style.display === "block") {

                        profileDropdown.style.display =
                            "none";

                    }
                    else {

                        profileDropdown.style.display =
                            "block";

                    }

                });



                window.addEventListener("click", function (e) {

                    if (
                        !profileButton.contains(e.target)
                        &&
                        !profileDropdown.contains(e.target)
                    ) {

                        profileDropdown.style.display =
                            "none";

                    }

                });

            }

        }



        window.logout = function () {

            localStorage.removeItem("token");

            window.location.href =
                "./login.html";

        }



        function setActiveMenu() {

            const currentPage =
                window.location.pathname
                    .split("/")
                    .pop();



            const params =
                new URLSearchParams(
                    window.location.search
                );



            const gender =
                params.get("gender");



            document
                .querySelectorAll(
                    ".header__menu ul li"
                )
                .forEach(item => {

                    item.classList.remove("active");

                });



            if (
                currentPage === "" ||
                currentPage === "index.html"
            ) {

                document
                    .getElementById("menuHome")
                    ?.classList.add("active");

            }
            else if (
                currentPage === "contact.html"
            ) {

                document
                    .getElementById("menuContact")
                    ?.classList.add("active");

            }
            else if (
                currentPage === "shop.html"
            ) {

                if (gender === "women") {

                    document
                        .getElementById("menuWomen")
                        ?.classList.add("active");

                }
                else if (gender === "men") {

                    document
                        .getElementById("menuMen")
                        ?.classList.add("active");

                }
                else if (gender === "kids") {

                    document
                        .getElementById("menuKids")
                        ?.classList.add("active");

                }
                else {

                    document
                        .getElementById("menuProducts")
                        ?.classList.add("active");

                }

            }

        }



        updateHeader();

        setActiveMenu();

    </script>
    <style>
        #profileDropdown a,
        #profileDropdown button {

            transition: 0.2s;
        }



        #profileDropdown a:hover,
        #profileDropdown button:hover {

            background: #f5f5f5;

            padding-left: 28px;
        }



        #profileDropdown button {

            cursor: pointer;
        }
    </style>
    </script>
</header>
