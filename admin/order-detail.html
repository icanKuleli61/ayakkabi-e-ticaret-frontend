    <style>
        .admin-topbar {

            margin-bottom: 30px;
        }



        .admin-page-title h3 {

            font-size: 34px;

            font-weight: 800;

            color: #111;

            margin-bottom: 8px;
        }



        .admin-page-title p {

            color: #888;

            margin: 0;

            font-size: 15px;
        }



        .admin-card {

            background: #fff;

            border-radius: 24px;

            padding: 30px;

            box-shadow:
                0 10px 35px rgba(0, 0, 0, 0.04);

            border: 1px solid #f1f1f1;
        }



        .admin-table {

            margin: 0;

            border-collapse: separate;

            border-spacing: 0 18px;
        }



        .admin-table thead tr {

            background: transparent;
        }



        .admin-table th {

            font-size: 14px;

            font-weight: 800;

            color: #999;

            border: none;

            padding: 0 20px 14px 20px;

            text-transform: uppercase;

            letter-spacing: 0.5px;
        }



        .admin-table tbody tr {

            background: #fff;

            transition: 0.25s;

            box-shadow:
                0 3px 12px rgba(0, 0, 0, 0.04);

            border-radius: 18px;
        }



        .admin-table tbody tr:hover {

            transform: translateY(-3px);

            box-shadow:
                0 10px 25px rgba(0, 0, 0, 0.07);
        }



        .admin-table td {

            vertical-align: middle;

            padding: 22px 20px;

            border: none;

            background: #fff;
        }



        .admin-table td:first-child {

            border-top-left-radius: 18px;

            border-bottom-left-radius: 18px;
        }



        .admin-table td:last-child {

            border-top-right-radius: 18px;

            border-bottom-right-radius: 18px;
        }



        .product-image-wrapper {

            width: 110px;

            height: 110px;

            background: #f8f8f8;

            border-radius: 24px;

            display: flex;

            align-items: center;

            justify-content: center;

            overflow: hidden;

            border: 1px solid #f1f1f1;
        }



        .product-image {

            width: 100%;

            height: 100%;

            object-fit: cover;
        }



        .product-info {

            display: flex;

            flex-direction: column;

            justify-content: center;

            gap: 6px;
        }



        .product-name {

            font-size: 18px;

            font-weight: 800;

            color: #111;

            line-height: 1.4;
        }



        .status-badge {

            display: inline-flex;

            align-items: center;

            justify-content: center;

            min-width: 140px;

            height: 42px;

            padding: 0 18px;

            border-radius: 999px;

            font-size: 13px;

            font-weight: 700;

            white-space: nowrap;
        }



        .status-active {

            background: #e7f8ef;

            color: #1f9d55;
        }



        .status-passive {

            background: #fff0f0;

            color: #ff4d4f;
        }

        .order-row {

            cursor: pointer;

            transition: all .2s ease;
        }



        .order-row:hover {

            background: #fafafa;
        }


        .actions {

            display: flex;

            align-items: center;

            gap: 12px;
        }

        .order-no {

            font-weight: 700;

            white-space: nowrap;
        }

        .action-btn {

            width: 44px;

            height: 44px;

            border-radius: 14px;

            border: none;

            cursor: pointer;

            display: flex;

            align-items: center;

            justify-content: center;

            transition: 0.2s;

            font-size: 18px;
        }



        .action-btn:hover {

            transform: translateY(-2px);
        }



        .btn-edit {

            background: #111;

            color: #fff;
        }



        .btn-passive {

            background: #fff4e5;

            color: #ff9800;
        }



        .btn-active {

            background: #e8f7ee;

            color: #1f9d55;
        }



        .form-control {

            height: 56px;

            border-radius: 16px;

            border: 1px solid #eee;

            box-shadow: none;

            font-size: 15px;

            padding: 0 20px;
        }



        .form-control:focus {

            border-color: #111;

            box-shadow: none;
        }



        .site-btn {

            height: 56px;

            display: inline-flex;

            align-items: center;

            justify-content: center;

            padding: 0 28px;

            border-radius: 16px;

            font-size: 14px;

            font-weight: 800;

            letter-spacing: 0.5px;
        }

        .banner-card {

            padding: 20px;
        }



        .banner-image-wrapper {

            width: 100%;

            height: 240px;

            overflow: hidden;

            border-radius: 18px;

            background: #f8f8f8;
        }



        .banner-image {

            width: 100%;

            height: 100%;

            object-fit: cover;
        }



        .admin-label {

            font-size: 14px;

            font-weight: 700;

            margin-bottom: 10px;

            display: block;

            color: #111;
        }

        .banner-create-card {

            padding: 22px;
        }

        .banner-card {

            transition: .25s;
        }



        .banner-card:hover {

            transform: translateY(-4px);

            box-shadow:
                0 14px 40px rgba(0, 0, 0, .08);
        }

        .orders-table-wrapper {

            height: calc(100vh - 260px);

            overflow-y: auto;

            overflow-x: hidden;

            border-radius: 18px;
        }



        .orders-table-wrapper::-webkit-scrollbar {

            width: 8px;
        }



        .orders-table-wrapper::-webkit-scrollbar-thumb {

            background: #dcdcdc;

            border-radius: 999px;
        }



        .admin-table thead {

            position: sticky;

            top: 0;

            z-index: 20;
        }



        .admin-table thead th {

            background: #fff;
        }
    </style>

    <script src="../js/jquery-3.3.1.min.js"></script>

    <script>

        const currentPage = "orders";

        let order = null;

        let orderId = null;

        let token = null;



        document.addEventListener(

            "DOMContentLoaded",

            async function () {

                await initializePage();

            }
        );



        async function initializePage() {

            try {

                token = localStorage.getItem(
                    "admin_token"
                );



                if (!token) {

                    window.location.href =
                        "login.html";

                    return;
                }



                const params =
                    new URLSearchParams(
                        window.location.search
                    );



                orderId =
                    params.get("id");



                if (!orderId) {

                    alert(
                        "Sipariş bulunamadı."
                    );

                    return;
                }



                showLoader();

                await loadSidebar();

                await fetchOrderDetail();

                hideLoader();

            }
            catch (error) {

                console.error(error);
            }
        }



        async function loadSidebar() {

            try {

                const response = await fetch(
                    "./sidebar.html"
                );



                if (!response.ok) {

                    throw new Error(
                        "Sidebar yüklenemedi"
                    );
                }



                const html =
                    await response.text();



                document.getElementById(
                    "sidebar-container"
                ).innerHTML = html;



                setActiveSidebar();

            }
            catch (error) {

                console.error(
                    "Sidebar hatası:",
                    error
                );
            }
        }



        function setActiveSidebar() {

            const sidebarLinks =

                document.querySelectorAll(
                    ".sidebar-link"
                );



            sidebarLinks.forEach(link => {

                link.classList.remove(
                    "active"
                );



                if (

                    link.dataset.page ===
                    currentPage

                ) {

                    link.classList.add(
                        "active"
                    );
                }
            });
        }



        async function fetchOrderDetail() {

            try {

                const response = await fetch(

                    `http://localhost:8000/api/admin/orders/${orderId}`,

                    {

                        method: "GET",

                        headers: {

                            "Accept":
                                "application/json",

                            "Authorization":
                                `Bearer ${token}`
                        }
                    }
                );



                if (response.status === 401) {

                    localStorage.removeItem(
                        "admin_token"
                    );

                    window.location.href =
                        "login.html";

                    return;
                }



                const result =
                    await response.json();



                order =
                    result.data;



                renderOrderDetail();

            }
            catch (error) {

                console.error(
                    "Sipariş detayı alınamadı:",
                    error
                );
            }
        }



        function renderOrderDetail() {

            renderLeftContent();

            renderSummary();
        }


        function renderLeftContent() {

            document.getElementById(
                "orderDetail"
            ).innerHTML = `

    <!-- ORDER HEADER -->

    <div
        style="
            background:#fff;
            border:1px solid #eee;
            border-radius:18px;
            padding:35px;
            box-shadow:0 5px 20px rgba(0,0,0,0.04);
        "
    >

        <div style="
            display:flex;
            align-items:center;
            justify-content:space-between;
            gap:20px;
            flex-wrap:wrap;
        ">

            <div>

                <h2 style="
                    font-size:42px;
                    font-weight:800;
                    margin-bottom:10px;
                ">
                    ${order.order_no}
                </h2>

                <p style="
                    color:#777;
                    margin:0;
                    font-size:18px;
                ">
                    ${order.created_at}
                </p>

            </div>

            <span

                class="status-badge"

                style="
                    background:${getStatusColor(order.status)}15;
                    color:${getStatusColor(order.status)};
                "
            >

                ${order.status_text}

            </span>

        </div>

    </div>



    <!-- ADDRESS -->

    <div
        style="
            background:#fff;
            border:1px solid #eee;
            border-radius:18px;
            padding:35px;
            box-shadow:0 5px 20px rgba(0,0,0,0.04);
        "
    >

        <h3 style="
            font-size:30px;
            font-weight:800;
            margin-bottom:25px;
        ">
            Teslimat Adresi
        </h3>

        <div style="
            display:flex;
            flex-direction:column;
            gap:14px;
            color:#555;
            font-size:17px;
            line-height:1.7;
        ">

            <div>
                ${order.address.full_name}
            </div>

            <div>
                ${order.address.phone}
            </div>

            <div>
                ${order.address.city}
                /
                ${order.address.district}
            </div>

            <div>
                ${order.address.neighborhood}
            </div>

            <div>
                ${order.address.address_text}
            </div>

        </div>

    </div>



    <!-- PRODUCTS -->

    <div
        style="
            background:#fff;
            border:1px solid #eee;
            border-radius:18px;
            padding:35px;
            box-shadow:0 5px 20px rgba(0,0,0,0.04);
        "
    >

        <h3 style="
            font-size:30px;
            font-weight:800;
            margin-bottom:25px;
        ">
            Sipariş Ürünleri
        </h3>

        <div style="
            display:flex;
            flex-direction:column;
            gap:20px;
        ">

            ${renderItems()}

        </div>

    </div>

`;
        }
        function renderItems() {

            if (!order.items?.length) {

                return `
            <div style="
                font-size:18px;
                color:#888;
            ">
                Ürün bulunamadı
            </div>
        `;
            }

            let html = "";

            order.items.forEach(item => {

                html += `

        <div style="
            width:100%;

            border:1px solid #eee;
            border-radius:22px;

            padding:28px;

            display:flex;
            align-items:center;
            justify-content:space-between;

            gap:28px;

            background:#fff;
        ">

            <!-- SOL -->

            <div style="
                display:flex;
                align-items:center;
                gap:24px;

                flex:1;
                min-width:0;
            ">

                <!-- RESİM -->

                <div style="
                    width:140px;
                    min-width:140px;
                    height:140px;

                    border-radius:20px;
                    overflow:hidden;

                    background:#fafafa;
                    border:1px solid #f1f1f1;

                    display:flex;
                    align-items:center;
                    justify-content:center;

                    padding:14px;
                ">

                    <img
                        src="http://127.0.0.1:8000/storage/${item.image}"
                        style="
                            width:100%;
                            height:100%;
                            object-fit:contain;
                        "
                    >

                </div>

                <!-- BİLGİ -->

                <div style="
                    flex:1;
                    min-width:0;
                ">

                    <h4 style="
                        font-size:32px;
                        font-weight:800;
                        color:#111;

                        margin-bottom:14px;
                        line-height:1.4;

                        overflow:hidden;
                        text-overflow:ellipsis;

                        display:-webkit-box;
                        -webkit-line-clamp:2;
                        -webkit-box-orient:vertical;
                    ">
                        ${item.product_name}
                    </h4>

                    <div style="
                        color:#666;
                        font-size:18px;
                        margin-bottom:12px;
                    ">
                        ${item.variant}
                        /
                        Numara ${item.size}
                    </div>

                    <div style="
                        color:#666;
                        font-size:18px;
                    ">
                        Adet:
                        ${item.quantity}
                    </div>

                </div>

            </div>

            <!-- FİYAT -->

            <div style="
                font-size:44px;
                font-weight:900;
                color:#111;

                white-space:nowrap;
                flex-shrink:0;
            ">
                ₺${item.subtotal}
            </div>

        </div>

        `;
            });

            return `

    <div style="
        display:flex;
        flex-direction:column;

        gap:22px;

        width:100%;

        max-height:700px;
        overflow-y:auto;

        padding-right:8px;
    ">

        ${html}

    </div>

`;
        }

        function renderSummary() {

            document.getElementById(
                "summaryContent"
            ).innerHTML = `

            <div style="
                display:flex;
                flex-direction:column;
                gap:18px;
            ">

                <div style="
                    display:flex;
                    justify-content:space-between;
                ">
                    <span>
                        Ara Toplam
                    </span>

                    <strong>
                        ₺${order.subtotal}
                    </strong>
                </div>

                <div style="
                    display:flex;
                    justify-content:space-between;
                ">
                    <span>
                        Kargo
                    </span>

                    <strong>
                        ₺${order.shipping_price}
                    </strong>
                </div>

                <div style="
                    display:flex;
                    justify-content:space-between;
                ">
                    <span>
                        Ödeme Türü
                    </span>

                    <strong>
                        ${order.payment_method_text}
                    </strong>
                </div>

                <div style="
                    display:flex;
                    justify-content:space-between;
                ">
                    <span>
                        Ödeme Durumu
                    </span>

                    <strong>
                        ${order.payment_status_text}
                    </strong>
                </div>

                <div style="
                    height:1px;
                    background:#eee;
                "></div>

                <div style="
                    display:flex;
                    justify-content:space-between;
                    align-items:center;
                    font-size:32px;
                    font-weight:800;
                ">
                    <span>
                        Toplam
                    </span>

                    <span>
                        ₺${order.total_price}
                    </span>
                </div>

                <div style="
                    margin-top:20px;
                ">

                    <select
                    id="statusSelect"
                    class="form-control"

                    ${["cancelled", "delivered", "completed"].includes(order.status)
                    ? "disabled"
                    : ""}
                     >

                        <option value="pending">
                            Sipariş Alındı
                        </option>

                        <option value="approved">
                            Sipariş Onaylandı
                        </option>

                        <option value="supplying">
                            Tedarik Ediliyor
                        </option>

                        <option value="packaging">
                            Paketleniyor
                        </option>

                        <option value="shipped">
                            Kargoya Verildi
                        </option>

                        <option value="out_for_delivery">
                            Dağıtıma Çıktı
                        </option>

                        <option value="delivered">
                            Teslim Edildi
                        </option>

                        <option value="cancelled">
                            İptal Edildi
                        </option>

                    </select>

                    <button

                        onclick="updateOrderStatus()"

                        class="site-btn"

                        ${order.status === "cancelled" ? "disabled" : ""}

                        style="
                            width:100%;
                            margin-top:15px;

                            background:${["cancelled", "delivered", "completed"].includes(order.status)
                    ? "#999"
                    : "#111"};

                        cursor:${["cancelled", "delivered", "completed"].includes(order.status)
                    ? "not-allowed"
                    : "pointer"};

                        opacity:${["cancelled", "delivered", "completed"].includes(order.status)
                    ? "0.7"
                    : "1"};
                        "
                    >

                        Sipariş Durumunu Güncelle

                    </button>

                </div>

            </div>

        `;



            $('#statusSelect').niceSelect();



            setTimeout(() => {

                const select =

                    document.getElementById(
                        "statusSelect"
                    );



                if (select) {

                    select.value =
                        order.status;

                    $('#statusSelect')
                        .niceSelect('update');
                }

            }, 50);
        }

        async function updateOrderStatus() {

            try {

                const token =
                    localStorage.getItem("admin_token");

                const status =
                    $("#statusSelect").val();

                console.log("STATUS =", status);

                const response = await fetch(

                    `http://127.0.0.1:8000/api/admin/orders/${orderId}/status`,

                    {
                        method: "POST",

                        headers: {

                            "Content-Type": "application/json",

                            "Accept": "application/json",

                            "X-Requested-With": "XMLHttpRequest",

                            "Authorization": `Bearer ${token}`
                        },

                        body: JSON.stringify({

                            _method: "PATCH",

                            status: status
                        })
                    }
                );

                const data =
                    await response.json();

                console.log(data);

                if (!response.ok) {

                    alert(
                        data.message ||
                        "Durum güncellenemedi"
                    );

                    return;
                }

                alert(
                    data.message ||
                    "Sipariş durumu güncellendi"
                );

                await fetchOrderDetail();

            }
            catch (error) {

                console.error(error);

                alert("Bir hata oluştu");
            }
        }


        function showLoader() {

            document.getElementById(
                "profileLoader"
            ).style.display = "flex";



            document.getElementById(
                "profileContent"
            ).style.display = "none";
        }



        function hideLoader() {

            document.getElementById(
                "profileLoader"
            ).style.display = "none";



            document.getElementById(
                "profileContent"
            ).style.display = "block";
        }



        function getStatusColor(status) {

            switch (status) {

                case "pending":
                    return "#f39c12";

                case "approved":

                case "shipped":
