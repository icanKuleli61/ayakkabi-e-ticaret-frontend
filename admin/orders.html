    <style>
        .admin-topbar {

            margin-bottom: 30px;
        }



        .admin-page-title h3 {

            font-size: 34px;

            font-weight: 800;

            color: #111;

            margin-bottom: 8px;
        }



        .admin-page-title p {

            color: #888;

            margin: 0;

            font-size: 15px;
        }



        .admin-card {

            background: #fff;

            border-radius: 24px;

            padding: 30px;

            box-shadow:
                0 10px 35px rgba(0, 0, 0, 0.04);

            border: 1px solid #f1f1f1;
        }



        .admin-table {

            margin: 0;

            border-collapse: separate;

            border-spacing: 0 18px;
        }



        .admin-table thead tr {

            background: transparent;
        }



        .admin-table th {

            font-size: 14px;

            font-weight: 800;

            color: #999;

            border: none;

            padding: 0 20px 14px 20px;

            text-transform: uppercase;

            letter-spacing: 0.5px;
        }



        .admin-table tbody tr {

            background: #fff;

            transition: 0.25s;

            box-shadow:

            border-radius: 18px;
        }



        .admin-table tbody tr:hover {

            transform: translateY(-3px);

            box-shadow:
                0 10px 25px rgba(0, 0, 0, 0.07);
        }



        .admin-table td {

            vertical-align: middle;

            padding: 22px 20px;

            border: none;

            background: #fff;
        }



        .admin-table td:first-child {

            border-top-left-radius: 18px;

            border-bottom-left-radius: 18px;
        }



        .admin-table td:last-child {

            border-top-right-radius: 18px;

            border-bottom-right-radius: 18px;
        }



        .product-image-wrapper {

            width: 110px;

            height: 110px;

            background: #f8f8f8;

            border-radius: 24px;

            display: flex;

            align-items: center;

            justify-content: center;

            overflow: hidden;

            border: 1px solid #f1f1f1;
        }



        .product-image {

            width: 100%;

            height: 100%;

            object-fit: cover;
        }



        .product-info {

            display: flex;

            flex-direction: column;

            justify-content: center;

            gap: 6px;
        }



        .product-name {

            font-size: 18px;

            font-weight: 800;

            color: #111;

            line-height: 1.4;
        }



        .status-badge {

            display: inline-flex;

            align-items: center;

            justify-content: center;

            min-width: 140px;

            height: 42px;

            padding: 0 18px;

            border-radius: 999px;

            font-size: 13px;

            font-weight: 700;

            white-space: nowrap;
        }



        .status-active {

            background: #e7f8ef;

            color: #1f9d55;
        }



        .status-passive {

            background: #fff0f0;

            color: #ff4d4f;
        }

        .order-row {

            cursor: pointer;

            transition: all .2s ease;
        }



        .order-row:hover {

            background: #fafafa;
        }


        .actions {

            display: flex;

            align-items: center;

            gap: 12px;
        }

        .order-no {

            font-weight: 700;

            white-space: nowrap;
        }

        .action-btn {

            width: 44px;

            height: 44px;

            border-radius: 14px;

            border: none;

            cursor: pointer;

            display: flex;

            align-items: center;

            justify-content: center;

            transition: 0.2s;

            font-size: 18px;
        }



        .action-btn:hover {

            transform: translateY(-2px);
        }



        .btn-edit {

            background: #111;

            color: #fff;
        }



        .btn-passive {

            background: #fff4e5;

            color: #ff9800;
        }



        .btn-active {

            background: #e8f7ee;

            color: #1f9d55;
        }



        .form-control {

            height: 56px;

            border-radius: 16px;

            border: 1px solid #eee;

            box-shadow: none;

            font-size: 15px;

            padding: 0 20px;
        }



        .form-control:focus {

            border-color: #111;

            box-shadow: none;
        }



        .site-btn {

            height: 56px;

            display: inline-flex;

            align-items: center;

            justify-content: center;

            padding: 0 28px;

            border-radius: 16px;

            font-size: 14px;

            font-weight: 800;

            letter-spacing: 0.5px;
        }

        .banner-card {

            padding: 20px;
        }



        .banner-image-wrapper {

            width: 100%;

            height: 240px;

            overflow: hidden;

            border-radius: 18px;

            background: #f8f8f8;
        }



        .banner-image {

            width: 100%;

            height: 100%;

            object-fit: cover;
        }



        .admin-label {

            font-size: 14px;

            font-weight: 700;

            margin-bottom: 10px;

            display: block;

            color: #111;
        }

        .banner-create-card {

            padding: 22px;
        }

        .banner-card {

            transition: .25s;
        }



        .banner-card:hover {

            transform: translateY(-4px);

            box-shadow:
                0 14px 40px rgba(0, 0, 0, .08);
        }

        .orders-table-wrapper {

            height: calc(100vh - 260px);

            overflow-y: auto;

            overflow-x: hidden;

            border-radius: 18px;
        }



        .orders-table-wrapper::-webkit-scrollbar {

            width: 8px;
        }



        .orders-table-wrapper::-webkit-scrollbar-thumb {

            background: #dcdcdc;

            border-radius: 999px;
        }



        .admin-table thead {

            position: sticky;

            top: 0;

            z-index: 20;
        }



        .admin-table thead th {

            background: #fff;
        }
    </style>

    <!-- Js Plugins -->
    <script src="../js/jquery-3.3.1.min.js"></script>

    <script src="../js/bootstrap.min.js"></script>

    <script src="../js/jquery.nice-select.min.js"></script>

    <script>

        const currentPage = "orders";

        let orders = [];

        let filteredOrders = [];



        document.addEventListener(

            "DOMContentLoaded",

            async function () {

                await initializePage();

            }
        );



        async function initializePage() {

            try {

                const token = localStorage.getItem(
                    "admin_token"
                );

                if (!token) {

                    window.location.href =
                        "login.html";

                    return;
                }

                showLoader();

                await loadSidebar();

                await fetchOrders();

                $('select').niceSelect();

                initializeFilters();

                hideLoader();
            }
            catch (error) {

                console.error(
                    "Sayfa yüklenirken hata oluştu:",
                    error
                );
            }
        }



        async function loadSidebar() {

            try {

                const response = await fetch(
                    "./sidebar.html"
                );

                if (!response.ok) {

                    throw new Error(
                        "Sidebar yüklenemedi"
                    );
                }

                const html =
                    await response.text();

                document.getElementById(
                    "sidebar-container"
                ).innerHTML = html;

                setActiveSidebar();

            }
            catch (error) {

                console.error(
                    "Sidebar hatası:",
                    error
                );
            }
        }



        function setActiveSidebar() {

            const sidebarLinks =

                document.querySelectorAll(
                    ".sidebar-link"
                );

            sidebarLinks.forEach(link => {

                link.classList.remove(
                    "active"
                );

                if (
                    link.dataset.page ===
                    currentPage
                ) {

                    link.classList.add(
                        "active"
                    );
                }
            });
        }



        async function fetchOrders() {

            try {

                const token =
                    localStorage.getItem(
                        "admin_token"
                    );

                const response = await fetch(

                    "https://shoe-ecommerce-api.onrender.com/api/admin/orders",

                    {

                        method: "GET",

                        headers: {

                            "Accept":
                                "application/json",

                            "Authorization":
                                `Bearer ${token}`
                        }
                    }
                );

                if (response.status === 401) {

                    localStorage.removeItem(
                        "admin_token"
                    );

                    window.location.href =
                        "login.html";

                    return;
                }

                const result =
                    await response.json();

                orders =
                    result.data ?? [];

                filteredOrders =
                    [...orders];
                renderOrders();

            }
            catch (error) {

                console.error(
                    "Siparişler alınamadı:",
                    error
                );
            }
        }



        function renderOrders() {

            const tableBody =

                document.getElementById(
                    "ordersTableBody"
                );

            tableBody.innerHTML = "";

            if (
                filteredOrders.length === 0
            ) {

                tableBody.innerHTML = `

            <tr>

                <td colspan="5">

                    <div class="text-center py-5">

                        Sipariş bulunamadı

                    </div>

                </td>

            </tr>

        `;

                return;
            }

            let html = "";



            filteredOrders.forEach(order => {

                html += `

            <tr

                class="order-row"

                onclick="
                    goToOrderDetail(${order.id})
                "
            >

                <!-- ORDER NO -->

                <td>

                    <div class="order-no">

                        ${order.order_no}

                    </div>

                </td>



                <!-- CUSTOMER -->

                <td>

                    ${order.user_email ?? '-'}

                </td>



                <!-- DATE -->

                <td>

                    ${order.created_at}

                </td>



                <!-- TOTAL -->

                <td>

                    ₺${order.total_price}

                </td>



                <!-- STATUS -->

                <td>

                    <span

                        class="status-badge"

                        style="
                            background:${getStatusColor(order.status)}15;
                            color:${getStatusColor(order.status)};
                        "
                    >

                        ${order.status_text}

                    </span>

                </td>

            </tr>

        `;
            });

            tableBody.innerHTML = html;
        }


        function initializeFilters() {



            document
                .getElementById("searchOrder")

                .addEventListener(

                    "input",

                    function () {

                        applyFilters();
                    }
                );


            $(document).on(

                "change",

                "#statusFilter",

                function () {

                    applyFilters();
                }
            );
        }



        async function applyFilters() {

            try {

                const token =

                    localStorage.getItem(
                        "admin_token"
                    );



                const search =

                    document.getElementById(
                        "searchOrder"
                    ).value;



                const status =

                    document.getElementById(
                        "statusFilter"
                    ).value;

                const params =

                    new URLSearchParams();



                if (search) {

                    params.append(
                        "search",
                        search
                    );
                }



                if (status) {

                    params.append(
                        "status",
                        status
                    );

                    console.log(status);
                }


                const response = await fetch(

                    `https://shoe-ecommerce-api.onrender.com/api/admin/orders?${params.toString()}`,

                    {

                        method: "GET",

                        headers: {

                            "Accept":
                                "application/json",

                            "Authorization":
                                `Bearer ${token}`
                        }
                    }
                );



                const result =
                    await response.json();

                console.log(result);

                filteredOrders =
                    result.data ?? [];



                renderOrders();

            }
            catch (error) {

                console.error(
                    "Filter hatası:",
                    error
                );
            }
        }


        function showLoader() {

            document.getElementById(
                "profileLoader"
            ).style.display = "flex";

            document.getElementById(
                "profileContent"
            ).style.display = "none";
        }



        function hideLoader() {

            document.getElementById(
                "profileLoader"
            ).style.display = "none";

            document.getElementById(
                "profileContent"
            ).style.display = "block";
        }

        function getStatusColor(status) {

            switch (status) {

                case "pending":
                    return "#f39c12";

                case "approved":
                    return "#3498db";

                case "supplying":
                    return "#9b59b6";

                case "packaging":
                    return "#8e44ad";

                case "shipped":
                    return "#2d98da";

                case "out_for_delivery":
                    return "#3867d6";

                case "delivered":
                    return "#20bf6b";

                case "completed":
                    return "#111";

                case "cancelled":
                    return "#eb3b5a";

                default:
                    return "#999";
            }
        }

        function goToOrderDetail(id) {

            window.location.href =

                `order-detail.html?id=${id}`;
        }

    </script>
