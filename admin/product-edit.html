        .admin-page-header {

        .admin-card {

            position: absolute;

        .admin-input {

            height: 52px;

            border: 1px solid #ececec;

        }

        .admin-input:focus {

        .admin-select {

        .admin-filter-btn {

        .admin-table {

        .admin-table thead tr {

        .admin-table th {

            border: none;

        .admin-table td {

        .variant-count {

        .status-badge {

        .action-buttons {

        .action-btn {

            width: 42px;

        }

        .btn-edit {

            background: #111;

        }

        .btn-edit:hover {

        }

        .btn-status {

            background: #fff4e5;

        }

        .btn-status:hover {

            color: #fff;
        }

        .empty-product-area {

            padding: 80px 20px;

            text-align: center;
        }

        .empty-product-area img {

            width: 90px;

            opacity: .7;

            margin-bottom: 20px;
        }

        .empty-product-area h4 {

            font-size: 24px;

            margin-bottom: 10px;
        }

        .empty-product-area p {

            color: #777;

            margin: 0;
        }

        .pagination-area {

            display: flex;

            justify-content: center;

            gap: 10px;
        }

        .variant-card {

            display: flex;

            align-items: center;

            justify-content: space-between;

            padding: 20px;

            border: 1px solid #eee;

            border-radius: 18px;

            margin-bottom: 18px;

            cursor: pointer;

            transition: .2s;
        }

        .variant-card:hover {

            transform: translateY(-2px);

            box-shadow:
                0 6px 18px rgba(0, 0, 0, .06);
        }

        .variant-image {

            width: 90px;

            height: 90px;

            border-radius: 18px;

            overflow: hidden;

            background: #f7f7f7;

            display: flex;

            align-items: center;

            justify-content: center;

            margin-right: 18px;
        }

        .variant-image img {

            width: 100%;

            height: 100%;

            object-fit: contain;
        }

        .variant-content {

            flex: 1;
        }

        .variant-content h4 {

            font-size: 18px;

            font-weight: 800;

            margin-bottom: 6px;
        }

        .variant-content p {

            margin: 0;

            color: #777;
        }

        .variant-right span {

            display: inline-flex;

            align-items: center;

            justify-content: center;

            padding: 10px 16px;

            border-radius: 999px;

            background: #f4f4f4;

            font-weight: 700;
        }

        .modal-xl {

            max-width: 1200px;
        }

        .modal-content {

            border-radius: 24px;

            border: none;
        }

        .modal-header {

            padding: 28px 32px;

            border-bottom: 1px solid #f3f3f3;
        }

        .modal-body {

            padding: 32px;
        }

        .modal-footer {

            padding: 24px 32px;

            border-top: 1px solid #f3f3f3;
        }

        #variantImagesArea {

            display: flex;

            flex-direction: column;

            gap: 14px;
        }

        #variantImagesArea img {

            width: 100%;

            height: 140px;

            object-fit: cover;

            border-radius: 18px;

            border: 1px solid #eee;
        }

        #variantImagesArea {

            max-height: 700px;

            overflow-y: auto;

            padding-right: 8px;
        }

        #variantSizesArea {

            max-height: 500px;

            overflow-y: auto;

            padding-right: 8px;
        }

        .variant-size-box {

            border: 1px solid #eee;

            border-radius: 18px;

            padding: 18px;

            margin-bottom: 18px;
        }

        .form-text {

            margin-top: 8px;

            color: #888;

            font-size: 13px;
        }

        .admin-card .form-control {

            height: 54px;

            border-radius: 14px;

            border: 1px solid #ececec;

            box-shadow: none;
        }

        .admin-card textarea.form-control {

            height: auto;
        }

        .admin-card .form-control:focus {

            border-color: #111;

            box-shadow: none;
        }

        .variant-card-left {

            display: flex;

            align-items: center;
        }

        .variant-right {

            display: flex;

            align-items: center;

            gap: 10px;
        }

    <script>

        const currentPage =
            "products";



        let product = null;

        let brands = [];

        let categories = [];

        let colors = [];

        let currentVariant = null;

        let deletedVariants = [];

        let deletedImages = [];

        let deletedSizes = [];

        let selectedImages = [];


        const urlParams =
            new URLSearchParams(
                window.location.search
            );



        const productId =
            urlParams.get("id");



        async function loadSidebar() {

            const response =
                await fetch(
                    "./sidebar.html"
                );



            const html =
                await response.text();



            document.getElementById(
                "sidebar-container"
            ).innerHTML = html;



            const sidebarLinks =

                document.querySelectorAll(
                    ".sidebar-link"
                );



            sidebarLinks.forEach(link => {

                if (
                    link.dataset.page ===
                    currentPage
                ) {

                    link.classList.add(
                        "active"
                    );
                }
            });
        }



        async function loadBrands() {

            try {

                const response =

                    await fetch(
                        "https://shoe-ecommerce-api.onrender.com/api/brands"
                    );



                const data =
                    await response.json();



                brands = data.data ?? [];



                const select =

                    document.getElementById(
                        "brandSelect"
                    );



                select.innerHTML = `

            <option value="">
                Marka Seç
            </option>
            `;



                brands.forEach(brand => {

                    select.innerHTML += `

                <option value="${brand.id}">

                    ${brand.name}

                </option>
                `;
                });

            } catch (error) {

                console.log(error);
            }
        }



        async function loadCategories() {

            try {

                const response =

                    await fetch(
                        "https://shoe-ecommerce-api.onrender.com/api/categories"
                    );



                const data =
                    await response.json();



                categories = data.data ?? [];



                const select =

                    document.getElementById(
                        "categorySelect"
                    );



                select.innerHTML = `

            <option value="">
                Kategori Seç
            </option>
            `;



                categories.forEach(category => {

                    select.innerHTML += `

                <option value="${category.id}">

                    ${category.name}

                </option>
                `;
                });

            } catch (error) {

                console.log(error);
            }
        }



        async function loadColors() {

            try {

                const response =

                    await fetch(
                        "https://shoe-ecommerce-api.onrender.com/api/colors"
                    );



                const data =
                    await response.json();



                colors = data.data ?? [];



                const select =

                    document.getElementById(
                        "variantColorSelect"
                    );



                select.innerHTML = `

            <option value="">
                Renk Seç
            </option>
            `;



                colors.forEach(color => {

                    select.innerHTML += `

                <option value="${color.id}">

                    ${color.name}

                </option>
                `;
                });

            } catch (error) {

                console.log(error);
            }
        }



        let originalProduct = null;



        async function loadProduct() {

            try {

                const token =

                    localStorage.getItem(
                        "admin_token"
                    );



                if (!token) {

                    window.location.href =
                        "../login.html";

                    return;
                }



                const response =

                    await fetch(

                        `https://shoe-ecommerce-api.onrender.com/api/admin/products/${productId}`,

                        {

                            headers: {

                                Accept:
                                    "application/json",

                                Authorization:
                                    `Bearer ${token}`
                            }
                        }
                    );



                const data =
                    await response.json();



                product = data.data;

                fillProductFields();

                originalProduct =
                    JSON.stringify(
                        getCurrentPayload()
                    );


                renderVariants();

                document.getElementById(
                    "profileLoader"
                ).style.display = "none";



                document.getElementById(
                    "profileContent"
                ).style.display = "block";



            } catch (error) {

                console.log(error);

                alert(
                    "Ürün yüklenemedi"
                );
            }
        }



        function normalizeVariants(variants) {

            return variants.map(variant => {

                return {

                    id:
                        variant.id ?? null,

                    name:
                        variant.name,

                    color_id:
                        variant.color_id,

                    sizes:
                        variant.sizes.map(size => ({

                            id:
                                size.id ?? null,

                            size:
                                size.size,

                            stock:
                                size.stock,

                            price:
                                size.price
                        })),

                    images:
                        variant.images.map(

                            (image, index) => ({

                                id:
                                    image.id ?? null,

                                url:

                                    image.url
                                        ? image.url
                                        : image.preview,

                                is_main:
                                    index === 0
                            })
                        )
                };
            });
        }


        function fillProductFields() {

            document.getElementById(
                "productName"
            ).value =
                product.name ?? "";



            document.getElementById(
                "productDescription"
            ).value =
                product.description ?? "";



            document.getElementById(
                "categorySelect"
            ).value =
                product.category_id ?? "";



            document.getElementById(
                "brandSelect"
            ).value =
                product.brand_id ?? "";



            document.getElementById(
                "genderSelect"
            ).value =
                product.gender ?? "";
        }



        function renderVariants() {

            const container =

                document.getElementById(
                    "variantsContainer"
                );



            container.innerHTML = "";



            if (
                !product.variants ||
                product.variants.length === 0
            ) {

                container.innerHTML = `

            <div class="empty-variant-area">

                <h5>
                    Henüz varyant yok
                </h5>

            </div>
            `;

                return;
            }



            product.variants.forEach(variant => {

                container.innerHTML += `

            <div
                class="variant-card"

                onclick="
                    openVariantEditModal(
                        ${variant.id}
                    )
                "
            >

                <div class="variant-card-left">

                    <div class="variant-image">

                        <img
                            src="
                            ${variant.images?.[0]?.url

                        ?

                        variant.images[0].url

                        :

                        '../img/no-image.png'
                    }
                            "
                            alt=""
                        >

                    </div>



                    <div class="variant-content">

                        <h4>

                            ${variant.name}

                        </h4>

                        <p>

                            ${variant.color ?? '-'}

                        </p>

                    </div>

                </div>



                <div class="variant-right">

    <span>

       ${variant.sizes

                        ?.sort((a, b) => a.size - b.size)

                        ?.map(size => size.size)

                        ?.join(" • ")
                    }

    </span>



    <button

        class="action-btn btn-status"

        onclick="
            deleteVariant(
                event,
                ${variant.id}
            )
        "
    >

        <i class="fa fa-trash"></i>

    </button>
                </div>

            </div>
            `;
            });
        }



        function openVariantEditModal(
            variantId
        ) {

            const variant =

                product.variants.find(

                    item =>
                        item.id === variantId
                );



            if (!variant) {

                return;
            }



            currentVariant =
                variant;



            document.getElementById(
                "variantNameInput"
            ).value =
                variant.name ?? "";



            document.getElementById(
                "variantColorSelect"
            ).value =
                variant.color_id ?? "";



            renderVariantSizes(
                variant.sizes ?? []
            );



            selectedImages =
                variant.images ?? [];



            renderVariantImages();



            $("#variantModal").modal(
                "show"
            );
        }



        function renderVariantSizes(
            sizes
        ) {

            const container =

                document.getElementById(
                    "variantSizesArea"
                );



            container.innerHTML = "";



            sizes.forEach(size => {

                container.innerHTML += `

            <div
    class="variant-size-box"
    data-id="${size.id ?? ''}"
>

                <div class="row">

                    <div class="col-lg-4">

                        <label>
                            Numara
                        </label>

                        <input
                            type="number"
                            class="form-control"
                            value="${size.size}"
                        >

                    </div>

                    <div class="col-lg-4">

                        <label>
                            Stok
                        </label>

                        <input
                            type="number"
                            class="form-control"
                            value="${size.stock}"
                        >

                    </div>

                    <div class="col-lg-4">

                        <label>
                            Fiyat
                        </label>

                        <input
                            type="number"
                            class="form-control"
                            value="${size.price}"
                        >

                    </div>

                    <div class="col-lg-12 mt-3 text-right">

    <button

        type="button"

        class="action-btn btn-status"

        onclick="
            removeSizeInput(
                this
            )
        "
    >

        <i class="fa fa-trash"></i>

    </button>

</div>

                </div>

            </div>
            `;
            });
        }



        function renderVariantImages() {

            const container =

                document.getElementById(
                    "variantImagesArea"
                );



            container.innerHTML = "";



            if (selectedImages.length === 0) {

                container.innerHTML = `

        <div style="
            width:100%;
            padding:50px;
            border:2px dashed #e5e7eb;
            border-radius:20px;
            text-align:center;
            background:#fafafa;
            color:#999;
            font-size:15px;
            font-weight:600;
        ">

            Henüz fotoğraf eklenmedi

        </div>
        `;

                return;
            }



            selectedImages.forEach(
                (image, index) => {

                    const imageUrl =

                        image.url
                            ? image.url
                            : image.preview;


                    container.innerHTML += `

            <div style="
                width:130px;
            ">

                <div style="
                    position:relative;
                    border-radius:20px;
                    overflow:hidden;
                    background:#fff;
                    border:1px solid #eee;
                    box-shadow:0 4px 18px rgba(0,0,0,.05);
                ">

                    <img
                        src="${imageUrl}"
                        style="
                            width:100%;
                            height:180px;
                            object-fit:cover;
                            display:block;
                        "
                    >

                    <button

                        type="button"

                        onclick="
                            removeVariantImage(
                                ${index}
                            )
                        "

                        style="

            renderVariantImages();

        async function saveProduct() {

            const button =

                document.querySelector(
                    '.site-btn[onclick="saveProduct()"]'
                );



            let oldButtonText = "";



            try {

                const token =

                    localStorage.getItem(
                        "admin_token"
                    );



                if (!token) {

                    alert(
                        "Oturum bulunamadı"
                    );

                    window.location.href =
                        "../login.html";

                    return;
                }



                /*
                |--------------------------------------------------------------------------
                | FORM DATA
                |--------------------------------------------------------------------------
                */

                const formData =
                    new FormData();



                const productName =

                    document.getElementById(
                        "productName"
                    ).value.trim();



                const description =

                    document.getElementById(
                        "productDescription"
                    ).value.trim();



                const categoryId =

                    document.getElementById(
                        "categorySelect"
                    ).value;



                const brandId =

                    document.getElementById(
                        "brandSelect"
                    ).value;



                const gender =

                    document.getElementById(
                        "genderSelect"
                    ).value;



                /*
                |--------------------------------------------------------------------------
                | VALIDATION
                |--------------------------------------------------------------------------
                */

                if (!productName) {

                    alert(
                        "Ürün adı gerekli"
                    );

                    return;
                }



                if (!description) {

                    alert(
                        "Açıklama gerekli"
                    );

                    return;
                }



                if (!categoryId) {

                    alert(
                        "Kategori seçmelisiniz"
                    );

                    return;
                }



                if (!brandId) {

                    alert(
                        "Marka seçmelisiniz"
                    );

                    return;
                }



                if (!gender) {

                    alert(
                        "Cinsiyet seçmelisiniz"
                    );

                    return;
                }



                if (

                    !product.variants ||

                    product.variants.length === 0

                ) {

                    alert(
                        "En az 1 varyant gerekli"
                    );

                    return;
                }



                /*
                |--------------------------------------------------------------------------
                | PRODUCT
                |--------------------------------------------------------------------------
                */

                formData.append(
                    "name",
                    productName
                );



                formData.append(
                    "description",
                    description
                );



                formData.append(
                    "category_id",
                    categoryId
                );



                formData.append(
                    "brand_id",
                    brandId
                );



                formData.append(
                    "gender",
                    gender
                );



                /*
                |--------------------------------------------------------------------------
                | VARIANTS
                |--------------------------------------------------------------------------
                */

                product.variants.forEach(

                    (
                        variant,
                        variantIndex
                    ) => {

                        if (!variant.name) {

                            throw new Error(
                                `${variantIndex + 1}. varyant adı eksik`
                            );
                        }



                        if (!variant.color_id) {

                            throw new Error(
                                `${variantIndex + 1}. varyantta renk seçilmemiş`
                            );
                        }



                        if (

                            !variant.images ||

                            variant.images.length === 0

                        ) {

                            throw new Error(
                                `${variant.name} varyantında fotoğraf yok`
                            );
                        }



                        if (

                            !variant.sizes ||

                            variant.sizes.length === 0

                        ) {

                            throw new Error(
                                `${variant.name} varyantında numara yok`
                            );
                        }



                        /*
                        |--------------------------------------------------------------------------
                        | VARIANT INFO
                        |--------------------------------------------------------------------------
                        */

                        if (variant.id) {

                            formData.append(

                                `variants[${variantIndex}][id]`,

                                variant.id
                            );
                        }



                        formData.append(

                            `variants[${variantIndex}][name]`,

                            variant.name
                        );



                        formData.append(

                            `variants[${variantIndex}][color_id]`,

                            variant.color_id
                        );



                        /*
                        |--------------------------------------------------------------------------
                        | SIZES
                        |--------------------------------------------------------------------------
                        */

                        variant.sizes.forEach(

                            (
                                size,
                                sizeIndex
                            ) => {

                                if (

                                    !size.size ||

                                    isNaN(size.stock) ||

                                    size.stock < 0 ||

                                    isNaN(size.price) ||

                                    size.price <= 0

                                ) {

                                    throw new Error(
                                        `${variant.name} varyantında numara bilgileri eksik`
                                    );
                                }



                                if (size.id) {

                                    formData.append(

                                        `variants[${variantIndex}][sizes][${sizeIndex}][id]`,

                                        size.id
                                    );
                                }



                                formData.append(

                                    `variants[${variantIndex}][sizes][${sizeIndex}][size]`,

                                    size.size
                                );



                                formData.append(

                                    `variants[${variantIndex}][sizes][${sizeIndex}][stock]`,

                                    size.stock
                                );



                                formData.append(

                                    `variants[${variantIndex}][sizes][${sizeIndex}][price]`,

                                    size.price
                                );
                            }
                        );



                        /*
                        |--------------------------------------------------------------------------
                        | IMAGES
                        |--------------------------------------------------------------------------
                        */

                        variant.images.forEach(

                            (
                                image,
                                imageIndex
                            ) => {

                                /*
                                |--------------------------------------------------------------------------
                                | EXISTING IMAGE
                                |--------------------------------------------------------------------------
                                */

                                if (image.id) {

                                    formData.append(

                                        `variants[${variantIndex}][images][${imageIndex}][id]`,

                                        image.id
                                    );



                                    formData.append(

                                        `variants[${variantIndex}][images][${imageIndex}][is_main]`,

                                        imageIndex === 0
                                            ? 1
                                            : 0
                                    );

                                    return;
                                }



                                /*
                                |--------------------------------------------------------------------------
                                | NEW IMAGE
                                |--------------------------------------------------------------------------
                                */

                                if (image.file) {

                                    formData.append(

                                        `variants[${variantIndex}][images][${imageIndex}][file]`,

                                        image.file
                                    );



                                    formData.append(

                                        `variants[${variantIndex}][images][${imageIndex}][is_main]`,

                                        imageIndex === 0
                                            ? 1
                                            : 0
                                    );
                                }
                            }
                        );
                    }
                );



                /*
                |--------------------------------------------------------------------------
                | DELETES
                |--------------------------------------------------------------------------
                */

                deletedVariants.forEach(

                    (id, index) => {

                        formData.append(

                            `deleted_variants[${index}]`,

                            id
                        );
                    }
                );



                deletedImages.forEach(

                    (id, index) => {

                        formData.append(

                            `deleted_images[${index}]`,

                            id
                        );
                    }
                );



                deletedSizes.forEach(

                    (id, index) => {

                        formData.append(

                            `deleted_sizes[${index}]`,

                            id
                        );
                    }
                );



                /*
                |--------------------------------------------------------------------------
                | BUTTON
                |--------------------------------------------------------------------------
                */

                if (button) {

                    oldButtonText =
                        button.innerHTML;

                    button.disabled = true;

                    button.innerHTML =
                        "Güncelleniyor...";
                }



                /*
                |--------------------------------------------------------------------------
                | REQUEST
                |--------------------------------------------------------------------------
                */

                const response =

                    await fetch(

                        `https://shoe-ecommerce-api.onrender.com/api/admin/products/${productId}/full-update`,

                        {

                            method: "POST",

                            headers: {

                                Accept:
                                    "application/json",

                                Authorization:
                                    `Bearer ${token}`
                            },

                            body:
                                (() => {

                                    formData.append(
                                        "_method",
                                        "PATCH"
                                    );

                                    return formData;

                                })()
                        }
                    );



                const data =
                    await response.json();



                console.log(data);



                /*
                |--------------------------------------------------------------------------
                | ERROR
                |--------------------------------------------------------------------------
                */

                if (!response.ok) {

                    let errorMessage =
                        "Güncelleme başarısız";



                    if (data.message) {

                        errorMessage =
                            data.message;
                    }



                    if (data.errors) {

                        const firstError =

                            Object.values(
                                data.errors
                            )[0];



                        if (

                            Array.isArray(
                                firstError
                            )

                        ) {

                            errorMessage =
                                firstError[0];
                        }
                    }

                    alert(errorMessage);

                    return;
                }

                deletedVariants = [];

                deletedImages = [];

                deletedSizes = [];



                originalProduct =
                    JSON.stringify(
                        getCurrentPayload()
                    );



                alert(
                    "Ürün güncellendi"
                );

                await loadProduct();

            } catch (error) {

                console.log(error);

                alert(
                    error.message ||
                    "Bir hata oluştu"
                );

            } finally {

                if (button) {

                    button.disabled = false;

                    button.innerHTML =
                        oldButtonText ||
                        "ÜRÜNÜ GÜNCELLE";
                }
            }
        }


        async function initPage() {

            await loadSidebar();

            await loadBrands();

            await loadCategories();

            await loadColors();

            await loadProduct();
        }

        function saveVariantChanges() {

            try {

                const variantName =

                    document.getElementById(
                        "variantNameInput"
                    ).value.trim();



                const colorId =

                    document.getElementById(
                        "variantColorSelect"
                    ).value;


                if (!variantName) {

                    alert(
                        "Varyant adı gerekli"
                    );

                    return;
                }



                if (!colorId) {

                    alert(
                        "Renk seçmelisiniz"
                    );

                    return;
                }



                if (selectedImages.length === 0) {

                    alert(
                        "En az 1 fotoğraf eklemelisiniz"
                    );

                    return;
                }



                const selectedColor =

                    colors.find(

                        color =>
                            color.id == colorId
                    );



                const sizeBoxes =

                    document.querySelectorAll(
                        ".variant-size-box"
                    );



                if (sizeBoxes.length === 0) {

                    alert(
                        "En az 1 numara eklemelisiniz"
                    );

                    return;
                }



                const sizes = [];

                let hasError = false;

                sizeBoxes.forEach(box => {

                    const inputs =

                        box.querySelectorAll(
                            "input"
                        );



                    const size =

                        parseInt(
                            inputs[0].value
                        );



                    const stock =

                        parseInt(
                            inputs[1].value
                        );



                    const price =

                        parseFloat(
                            inputs[2].value
                        );



                    if (

                        !size ||

                        stock < 0 ||

                        isNaN(stock) ||

                        !price ||

                        price <= 0

                    ) {

                        alert(
                            "Numara alanları eksik"
                        );

                        hasError = true;

                        return;
                    }

                    const duplicateSize =

                        sizes.find(

                            item =>
                                item.size === size
                        );



                    if (duplicateSize) {

                        alert(
                            `${size} numarası zaten eklenmiş`
                        );

                        hasError = true;

                        return;
                    }

                    sizes.push({

                        id:
                            box.dataset.id
                                ? parseInt(box.dataset.id)
                                : null,

                        size,

                        stock,

                        price
                    });
                });
                if (hasError) {

                    return;
                }


                if (currentVariant && currentVariant.id) {

                    currentVariant.name =
                        variantName;



                    currentVariant.color_id =
                        parseInt(colorId);



                    currentVariant.color =
                        selectedColor?.name ?? "";



                    currentVariant.images =
                        selectedImages;



                    currentVariant.sizes =
                        sizes;

                }

                else {

                    product.variants.push({

                        name: variantName,

                        color_id:
                            parseInt(colorId),

                        color:
                            selectedColor?.name ?? "",

                        images:
                            selectedImages,

                        sizes
                    });
                }


                renderVariants();


                $("#variantModal").modal(
                    "hide"
                );


                currentVariant = null;



                selectedImages = [];



                document.getElementById(
                    "variantImagesInput"
                ).value = "";



                document.getElementById(
                    "variantImagesArea"
                ).innerHTML = "";



                document.getElementById(
                    "variantSizesArea"
                ).innerHTML = "";



            } catch (error) {

                alert(
                    error.message ||
                    "Bir hata oluştu"
                );
            }
        }

        function getCurrentPayload() {

            return {

                name:
                    document.getElementById(
                        "productName"
                    ).value.trim(),

                description:
                    document.getElementById(
                        "productDescription"
                    ).value.trim(),

                category_id:
                    Number(
                        document.getElementById(
                            "categorySelect"
                        ).value
                    ) || null,

                brand_id:
                    Number(
                        document.getElementById(
                            "brandSelect"
                        ).value
                    ) || null,

                gender:
                    document.getElementById(
                        "genderSelect"
                    ).value,

                variants:
                    normalizeVariants(
                        product.variants
                    )
            };
        }

        function deleteVariant(
            event,
            variantId
        ) {

            event.stopPropagation();



            const confirmed = confirm(
                "Varyant silinsin mi?"
            );



            if (!confirmed) {

                return;
            }



            const variant =

                product.variants.find(

                    item =>
                        item.id === variantId
                );



            if (
                variant &&
                variant.id
            ) {

                deletedVariants.push(
                    variant.id
                );
            }



            product.variants =

                product.variants.filter(

                    item =>
                        item.id !== variantId
                );



            renderVariants();
        }


        function removeSizeInput(
            button
        ) {

            const sizeBox =

                button.closest(
                    ".variant-size-box"
                );



            if (!sizeBox) {

                return;
            }



            const sizeId =
                sizeBox.dataset.id;



            if (sizeId) {

                deletedSizes.push(
                    parseInt(sizeId)
                );
            }



            sizeBox.remove();
        }



        function handleVariantImages(event) {

            const files =

                Array.from(
                    event.target.files
                );



            const formattedImages =

                files.map(file => ({

                    file,
                    preview:
                        URL.createObjectURL(file)
                }));



            selectedImages = [

                ...selectedImages,

                ...formattedImages
            ];



            renderVariantImages();
        }


        initPage();

    </script>
