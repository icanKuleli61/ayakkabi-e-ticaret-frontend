<!DOCTYPE html>

<html lang="tr">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        Admin Giriş
    </title>



    <link rel="stylesheet" href="../css/bootstrap.min.css">

    <link rel="stylesheet" href="../css/style.css">

</head>

<body style="
    background:#f5f5f5;
">



    <div style="
        width:100%;
        min-height:100vh;
        display:flex;
        align-items:center;
        justify-content:center;
        padding:20px;
    ">

        <div style="
            width:100%;
            max-width:450px;
            background:white;
            border-radius:18px;
            padding:40px;
            box-shadow:0 10px 40px rgba(0,0,0,0.08);
        ">

            <div style="
                text-align:center;
                margin-bottom:35px;
            ">

                <h2 style="
                    font-weight:800;
                    margin-bottom:10px;
                ">
                    Admin Panel
                </h2>

                <p style="
                    color:#777;
                    margin:0;
                ">
                    Yönetim paneline giriş yapın.
                </p>

            </div>



            <div class="checkout__input">

                <p>Email</p>

                <input
                    type="email"
                    id="emailInput"
                    placeholder="admin@gmail.com"
                >

            </div>



            <div class="checkout__input">

                <p>Şifre</p>

                <input
                    type="password"
                    id="passwordInput"
                    placeholder="********"
                >

            </div>



            <button
                id="loginButton"
                class="site-btn"
                style="
                    width:100%;
                    border-radius:12px;
                    margin-top:10px;
                    height:55px;
                "
            >

                Giriş Yap

            </button>

        </div>

    </div>



    <div id="popup" style="
        position:fixed;
        top:30px;
        right:30px;
        background:white;
        padding:18px 22px;
        border-radius:16px;
        box-shadow:0 10px 40px rgba(0,0,0,0.12);
        z-index:99999;
        display:none;
        min-width:320px;
        align-items:center;
        gap:15px;
    ">

        <div id="popupIcon" style="
            width:38px;
            height:38px;
            border-radius:50%;
            display:flex;
            align-items:center;
            justify-content:center;
            color:white;
            font-size:18px;
            font-weight:bold;
            background:#27ae60;
        ">
            ✓
        </div>

        <p id="popupText" style="
            margin:0;
            font-size:16px;
            font-weight:600;
            color:#222;
        "></p>

    </div>



    <script>

        const API_BASE =
            "http://127.0.0.1:8000/api";



        function showPopup(
            message,
            success = true
        ) {

            const popup =
                document.getElementById(
                    "popup"
                );



            const popupText =
                document.getElementById(
                    "popupText"
                );



            const popupIcon =
                document.getElementById(
                    "popupIcon"
                );



            popupText.innerText =
                message;



            if (success)
            {

                popupIcon.style.background =
                    "#27ae60";



                popupIcon.innerText =
                    "✓";

            }
            else {

                popupIcon.style.background =
                    "#e74c3c";



                popupIcon.innerText =
                    "!";
            }



            popup.style.display =
                "flex";



            setTimeout(function () {

                popup.style.display =
                    "none";

            }, 3000);
        }



        document
            .getElementById(
                "loginButton"
            )
            .addEventListener(
                "click",

                async function ()
                {

                    try {

                        const email =
                            document
                                .getElementById(
                                    "emailInput"
                                )
                                .value;



                        const password =
                            document
                                .getElementById(
                                    "passwordInput"
                                )
                                .value;



                        const response =
                            await fetch(

                                API_BASE +
                                "/login",

                                {

                                    method: "POST",

                                    headers: {

                                        "Content-Type":
                                            "application/json",

                                        "Accept":
                                            "application/json"
                                    },

                                    body: JSON.stringify({

                                        email,
                                        password
                                    })
                                }
                            );



                        const data =
                            await response.json();



                        console.log(data);



                        if (!data.success)
                        {

                            showPopup(
                                "Email veya şifre hatalı",
                                false
                            );

                            return;
                        }



                        if (
                            data.user.role!==
                            "admin"
                        ) {

                            showPopup(
                                "Yönetim paneline giriş yetkiniz yok",
                                false
                            );

                            return;
                        }



                        localStorage.setItem(
                            "admin_token",
                            data.token
                        );



                        showPopup(
                            "Giriş başarılı"
                        );



                        setTimeout(function () {

                            window.location.href =
                                "/admin/dashboard.html";

                        }, 1000);

                    }
                    catch (error) {

                        console.log(error);



                        showPopup(
                            "Bir hata oluştu",
                            false
                        );
                    }
                }
            );

    </script>

</body>

</html>
