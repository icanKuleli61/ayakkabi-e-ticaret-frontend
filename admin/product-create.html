    <div id="variantModal" style="
        position:fixed;
        inset:0;

    ">

            <div style="

                    border:none;

                ">
                    ×

            </div>



            <div class="row">

                <div class="col-lg-6">

                    <div class="checkout__input">

                        <p>Varyant Adı</p>

                        <input type="text" id="variantNameInput" placeholder="Siyah Variantı">

                <div class="col-lg-6">

                    <div class="checkout__input">

                        <select id="variantColorInput">

                margin:0;

                margin-top:30px;

    <script>

        const API_BASE =
            "https://shoe-ecommerce-api.onrender.com/api";



        const token =
            localStorage.getItem("admin_token");



        if (!token) {

            window.location.href =
                "login.html";
        }

        function showPopup(
            message,
            success = true
        ) {

            const popup =
                document.getElementById(
                    "popup"
                );



            const popupText =
                document.getElementById(
                    "popupText"
                );



            const popupIcon =
                document.getElementById(
                    "popupIcon"
                );



            popupText.innerText =
                message;



            if (success) {

                popupIcon.style.background =
                    "#27ae60";



                popupIcon.innerText =
                    "✓";

            }
            else {

                popupIcon.style.background =
                    "#e74c3c";



                popupIcon.innerText =
                    "!";
            }



            popup.style.display =
                "flex";



            setTimeout(function () {

                popup.style.display =
                    "none";

            }, 3000);
        }



        async function loadCategories() {

            const response =
                await fetch(
                    API_BASE + "/categories"
                );



            const data =
                await response.json();



            const select =
                document.getElementById(
                    "categoryInput"
                );



            data.data.forEach(category => {

                select.innerHTML += `
                
                    <option value="${category.id}">
                        ${category.name}
                    </option>
                
                `;
            });



            $('#categoryInput').niceSelect('update');

        }




        async function loadBrands() {

            const response =
                await fetch(
                    API_BASE + "/brands"
                );



            const data =
                await response.json();



            const select =
                document.getElementById(
                    "brandInput"
                );



            data.data.forEach(brand => {

                select.innerHTML += `
        
            <option value="${brand.id}">
                ${brand.name}
            </option>
        
        `;
            });

            $('#brandInput').niceSelect('update');

        }




        async function loadColors() {

            const response =
                await fetch(
                    API_BASE + "/colors"
                );



            const data =
                await response.json();



            const select =
                document.getElementById(
                    "variantColorInput"
                );



            data.data.forEach(color => {

                select.innerHTML += `
        
            <option value="${color.id}">
                ${color.name}
            </option>
        
        `;
            });
            $('#variantColorInput').niceSelect('update');

        }



        loadCategories();

        loadBrands();

        loadColors();

        document
            .getElementById(
                "profileLoader"
            )
            .style.display =
            "none";



        document
            .getElementById(
                "profileContent"
            )
            .style.display =
            "block";


        const variantModal =
            document.getElementById(
                "variantModal"
            );

        let variants = [];

        let selectedImages = [];



        document
            .getElementById(
                "variantImagesInput"
            )
            .addEventListener(
                "change",
                handleImages
            );



        function handleImages(event) {

            const files =
                Array.from(
                    event.target.files
                );



            selectedImages = [
                ...selectedImages,
                ...files
            ];



            renderImagePreviews();
        }

        function renderImagePreviews() {

            const container =
                document.getElementById(
                    "imagePreviewContainer"
                );



            container.innerHTML = "";



            selectedImages.forEach(
                (image, index) => {

                    const imageUrl =
                        URL.createObjectURL(
                            image
                        );



                    container.innerHTML += `

                <div style="
                    width:120px;
                    border:1px solid #eee;
                    border-radius:12px;
                    overflow:hidden;
                    background:white;
                ">

                    <img
                        src="${imageUrl}"
                        style="
                            width:100%;
                            height:120px;
                            object-fit:cover;
                        "
                    >



                    <button
                        type="button"
                        onclick="removeImage(${index})"
                        style="
                            width:100%;
                            border:none;
                            background:#e74c3c;
                            color:white;
                            padding:10px;
                            font-weight:600;
                            cursor:pointer;
                        "
                    >
                        Sil
                    </button>

                </div>

            `;
                }
            );
        }

        function removeImage(index) {

            selectedImages.splice(
                index,
                1
            );



            renderImagePreviews();
        }
        document
            .getElementById(
                "addVariantButton"
            )
            .addEventListener(
                "click",
                function () {

                    variantModal.style.display =
                        "flex";

                }
            );



        document
            .getElementById(
                "closeVariantModal"
            )
            .addEventListener(
                "click",
                function () {

                    variantModal.style.display =
                        "none";

                }
            );

        document
            .getElementById(
                "addSizeButton"
            )
            .addEventListener(
                "click",
                addSizeRow
            );



        function addSizeRow() {

            const container =
                document.getElementById(
                    "sizesContainer"
                );



            const row =
                document.createElement(
                    "div"
                );



            row.className =
                "row";



            row.innerHTML = `

        <div class="col-lg-3">

            <input
                type="number"
                class="sizeInput"
                placeholder="Numara"
            >

        </div>



        <div class="col-lg-3">

            <input
                type="number"
                class="stockInput"
                placeholder="Stok"
            >

        </div>



        <div class="col-lg-3">

            <input
                type="number"
                class="priceInput"
                placeholder="Fiyat"
            >

        </div>



        <div class="col-lg-3">

            <button
                type="button"
                class="site-btn"
                style="
                    background:#e74c3c;
                    width:100%;
                "
                onclick="
                    this.parentElement.parentElement.remove()
                "
            >
                Sil
            </button>

        </div>

    `;



            container.appendChild(row);
        }
        document
            .getElementById(
                "saveVariantButton"
            )
            .addEventListener(
                "click",
                saveVariant
            );



        function saveVariant() {

            const name =
                document.getElementById(
                    "variantNameInput"
                ).value;



            const colorId =
                document.getElementById(
                    "variantColorInput"
                ).value;



            const images = [...selectedImages];

            const sizeRows =
                document.querySelectorAll(
                    "#sizesContainer .row"
                );



            let sizes = [];



            sizeRows.forEach(row => {

                sizes.push({

                    size:
                        row.querySelector(
                            ".sizeInput"
                        ).value,

                    stock:
                        row.querySelector(
                            ".stockInput"
                        ).value,

                    price:
                        row.querySelector(
                            ".priceInput"
                        ).value,
                });

            });



            if (
                !name ||
                !colorId
            ) {

                showPopup(
                    "Varyant bilgileri eksik",
                    false
                );

                return;
            }



            if (sizes.length === 0) {

                showPopup(
                    "En az 1 numara ekleyin",
                    false
                );

                return;
            }



            variants.push({

                name,
                color_id: colorId,
                images,
                sizes
            });

            renderVariants();

            document.getElementById(
                "variantNameInput"
            ).value = "";

            document.getElementById(
                "variantColorInput"
            ).value = "";

            document.getElementById(
                "sizesContainer"
            ).innerHTML = "";

            document.getElementById(
                "imagePreviewContainer"
            ).innerHTML = "";

            document.getElementById(
                "variantImagesInput"
            ).value = "";

            selectedImages = [];

            variantModal.style.display =
                "none";

            showPopup(
                "Varyant eklendi"
            );
        }

        function renderVariants() {

            const container =
                document.getElementById(
                    "variantsContainer"
                );



            container.innerHTML = "";



            variants.forEach(
                (variant, index) => {

                    container.innerHTML += `

                <div style="
                    border:1px solid #eee;
                    border-radius:16px;
                    padding:25px;
                    background:#fafafa;
                ">

                    <div style="
                        display:flex;
                        justify-content:space-between;
                        align-items:center;
                        margin-bottom:20px;
                    ">

                        <div>

                            <h5 style="
                                font-weight:700;
                                margin-bottom:8px;
                            ">
                                ${variant.name}
                            </h5>

                            <p style="
                                margin:0;
                                color:#777;
                            ">
                                ${variant.sizes.length
                        } numara • ${variant.images.length
                        } fotoğraf
                            </p>

                        </div>



                        <button
                            type="button"
                            onclick="removeVariant(${index})"
                            class="site-btn"
                            style="
                                background:#e74c3c;
                            "
                        >
                            Sil
                        </button>

                    </div>

                </div>

            `;
                }
            );
        }

        function removeVariant(index) {

            variants.splice(
                index,
                1
            );



            renderVariants();
        }

        document
            .getElementById(
                "createProductButton"
            )
            .addEventListener(
                "click",
                createProduct
            );



        async function createProduct() {

            const button =
                document.getElementById(
                    "createProductButton"
                );



            if (button.disabled) {
                return;
            }



            button.disabled = true;

            button.innerText =
                "Oluşturuluyor...";



            const name =
                document.getElementById(
                    "nameInput"
                ).value.trim();



            const categoryId =
                document.getElementById(
                    "categoryInput"
                ).value;



            const brandId =
                document.getElementById(
                    "brandInput"
                ).value;



            const gender =
                document.getElementById(
                    "genderInput"
                ).value;



            const description =
                document.getElementById(
                    "descriptionInput"
                ).value.trim();



            if (
                !name ||
                !categoryId ||
                !brandId ||
                !gender
            ) {

                showPopup(
                    "Ürün alanları eksik",
                    false
                );

                button.disabled = false;

                button.innerText =
                    "Ürünü Oluştur";

                return;
            }



            if (
                variants.length === 0
            ) {

                showPopup(
                    "En az 1 varyant ekleyin",
                    false
                );

                button.disabled = false;

                button.innerText =
                    "Ürünü Oluştur";

                return;
            }



            const formData =
                new FormData();



            formData.append(
                "name",
                name
            );



            formData.append(
                "category_id",
                categoryId
            );



            formData.append(
                "brand_id",
                brandId
            );



            formData.append(
                "gender",
                gender
            );



            formData.append(
                "description",
                description
            );



            variants.forEach(
                (
                    variant,
                    variantIndex
                ) => {

                    formData.append(
                        `variants[${variantIndex}][name]`,
                        variant.name
                    );



                    formData.append(
                        `variants[${variantIndex}][color_id]`,
                        variant.color_id
                    );



                    variant.sizes.forEach(
                        (
                            size,
                            sizeIndex
                        ) => {

                            formData.append(
                                `variants[${variantIndex}][sizes][${sizeIndex}][size]`,
                                size.size
                            );



                            formData.append(
                                `variants[${variantIndex}][sizes][${sizeIndex}][stock]`,
                                size.stock
                            );



                            formData.append(
                                `variants[${variantIndex}][sizes][${sizeIndex}][price]`,
                                size.price
                            );
                        }
                    );



                    Array.from(
                        variant.images
                    ).forEach(

                        (
                            image,
                            imageIndex
                        ) => {

                            formData.append(

                                `variants[${variantIndex}][images][${imageIndex}]`,

                                image
                            );
                        }
                    );
                }
            );



            try {

                const response = await fetch(

                    API_BASE + "/admin/products",

                    {

                        method: "POST",

                        headers: {

                            Authorization:
                                "Bearer " + token,

                            Accept:
                                "application/json"
                        },

                        body: formData
                    }
                );



                const data =
                    await response.json();



                console.log(data);



                if (!response.ok) {

                    showPopup(
                        data.message ||
                        "Ürün oluşturulamadı",
                        false
                    );

                    return;
                }



                showPopup(
                    "Ürün başarıyla oluşturuldu 🚀"
                );



                document.getElementById(
                    "nameInput"
                ).value = "";



                document.getElementById(
                    "categoryInput"
                ).value = "";



                document.getElementById(
                    "brandInput"
                ).value = "";



                document.getElementById(
                    "genderInput"
                ).value = "male";



                document.getElementById(
                    "descriptionInput"
                ).value = "";



                $('#categoryInput')
                    .niceSelect('update');



                $('#brandInput')
                    .niceSelect('update');



                $('#genderInput')
                    .niceSelect('update');



                variants = [];



                renderVariants();

            }
            catch (error) {

                console.log(error);



                showPopup(
                    "Sunucu hatası",
                    false
                );
            }
            finally {

                button.disabled = false;

                button.innerText =
                    "Ürünü Oluştur";
            }
        }
    </script>

    <script>

        const currentPage =
            "product-create";

        async function loadSidebar() {

            const response =
                await fetch(
                    "./sidebar.html"
                );

            const html =
                await response.text();

            document.getElementById(
                "sidebar-container"
            ).innerHTML = html;



            const sidebarLinks =

                document.querySelectorAll(
                    ".sidebar-link"
                );



            sidebarLinks.forEach(link => {

                if (

                    link.dataset.page ===
                    currentPage

                ) {

                    link.classList.add(
                        "active"
                    );
                }
            });
        }

        loadSidebar();

    </script>





    <div id="popup" style="
    position:fixed;
    top:30px;
    right:30px;
    background:white;
    padding:18px 22px;
    border-radius:16px;
    box-shadow:0 10px 40px rgba(0,0,0,0.12);
    z-index:99999;
    display:none;
    min-width:320px;
    align-items:center;
    gap:15px;
">

        <div id="popupIcon" style="
        width:38px;
        height:38px;
        border-radius:50%;
        display:flex;
        align-items:center;
        justify-content:center;
        color:white;
        font-size:18px;
        font-weight:bold;
        background:#27ae60;
    ">
