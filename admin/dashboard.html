    <script>

        const API_BASE =
            "http://127.0.0.1:8000/api";



        const token =
            localStorage.getItem("admin_token");



        if (!token) {

            window.location.href =
                "login.html";
        }

        function showPopup(
            message,
            success = true
        ) {

            const popup =
                document.getElementById(
                    "popup"
                );



            const popupText =
                document.getElementById(
                    "popupText"
                );



            const popupIcon =
                document.getElementById(
                    "popupIcon"
                );



            popupText.innerText =
                message;



            if (success) {

                popupIcon.style.background =
                    "#27ae60";



                popupIcon.innerText =
                    "✓";

            }
            else {

                popupIcon.style.background =
                    "#e74c3c";



                popupIcon.innerText =
                    "!";
            }



            popup.style.display =
                "flex";



            setTimeout(function () {

                popup.style.display =
                    "none";

            }, 3000);
        }



        async function loadDashboard() {

            try {

                const response =
                    await fetch(

                        API_BASE +
                        "/admin/dashboard",

                        {

                            method: "GET",

                            headers: {

                                "Authorization":
                                    "Bearer " + token,

                                "Accept":
                                    "application/json"
                            }
                        }
                    );


                if (response.status === 401) {

                    localStorage.removeItem(
                        "admin_token"
                    );

                    window.location.href =
                        "login.html";

                    return;
                }

                const data =
                    await response.json();



                console.log(data);



                if (data.success) {

                    document.getElementById(
                        "totalProducts"
                    ).innerText =

                        data.data.total_products;



                    document.getElementById(
                        "totalOrders"
                    ).innerText =

                        data.data.total_orders;



                    document.getElementById(
                        "totalUsers"
                    ).innerText =

                        data.data.total_users;

                    document.getElementById(
                        "totalRevenue"
                    ).innerText =

                        "₺" +
                        data.data.total_revenue;



                    const latestOrders =
                        data.data.latest_orders;



                    const latestOrdersContainer =
                        document.getElementById(
                            "latestOrders"
                        );



                    latestOrdersContainer.innerHTML =
                        "";



                    if (
                        latestOrders.length === 0
                    ) {

                        latestOrdersContainer.innerHTML = `

                        <div style="
                            padding:18px;
                            border-radius:12px;
                            background:white;
                            border:1px solid #eee;
                        ">

                            Henüz sipariş bulunmuyor.

                        </div>

                    `;

                    }



                    latestOrders.forEach(order => {

                        let statusText = "Sipariş Alındı";
                        let statusColor = "#ffeaa7";

                        switch (order.status) {

                            case "pending":
                                statusText = "Sipariş Alındı";
                                statusColor = "#ffeaa7";
                                break;

                            case "approved":
                                statusText = "Sipariş Onaylandı";
                                statusColor = "#d4edda";
                                break;

                            case "supplying":
                                statusText = "Tedarik Ediliyor";
                                statusColor = "#d6e4ff";
                                break;

                            case "packaging":
                                statusText = "Paketleniyor";
                                statusColor = "#e5dbff";
                                break;

                            case "shipped":
                                statusText = "Kargoya Verildi";
                                statusColor = "#cfe2ff";
                                break;

                            case "out_for_delivery":
                                statusText = "Dağıtıma Çıktı";
                                statusColor = "#bfe3ff";
                                break;

                            case "delivered":
                                statusText = "Teslim Edildi";
                                statusColor = "#c8f7c5";
                                break;

                            case "completed":
                                statusText = "Tamamlandı";
                                statusColor = "#b2f2bb";
                                break;

                            case "cancelled":
                                statusText = "İptal Edildi";
                                statusColor = "#f8d7da";
                                break;
                        }

                        latestOrdersContainer.innerHTML += `

                        <a
                            href="./order-detail.html?id=${order.id}"

                            style="
                                padding:18px;
                                border-radius:14px;
                                background:white;
                                border:1px solid #eee;
                                display:flex;
                                justify-content:space-between;
                                align-items:center;
                                text-decoration:none;
                                transition:0.3s;
                            "

                            onmouseover="
                                this.style.transform='translateY(-3px)';
                                this.style.boxShadow='0 10px 25px rgba(0,0,0,0.06)';
                            "

                            onmouseout="
                                this.style.transform='translateY(0)';
                                this.style.boxShadow='none';
                            "
                        >

                            <div>

                                <h6 style="
                                    font-weight:700;
                                    margin-bottom:6px;
                                    color:#111;
                                    font-size:17px;
                                ">
                                    ${order.order_no}
                                </h6>

                                <p style="
                                    margin:0;
                                    color:#777;
                                    font-size:15px;
                                ">
                                    ${order.total_price} TL
                                </p>

                            </div>

                            <span style="
                                padding:10px 16px;
                                border-radius:30px;
                                background:${statusColor};
                                font-size:13px;
                                font-weight:700;
                                color:#111;
                            ">

                                ${statusText}

                            </span>

                        </a>

                    `;
                    });


                    document
                        .getElementById(
                            "profileLoader"
                        )
                        .style.display =
                        "none";



                    document
                        .getElementById(
                            "profileContent"
                        )
                        .style.display =
                        "block";
                }

            }
            catch (error) {

                console.log(error);



                showPopup(
                    "Dashboard yüklenemedi",
                    false
                );
            }
        }





        loadDashboard();

    </script>
    <script>

        async function loadSidebar() {

            const response =
                await fetch(
                    "./sidebar.html"
                );

            const html =
                await response.text();

            document.getElementById(
                "sidebar-container"
            ).innerHTML = html;



            const sidebarLinks =

                document.querySelectorAll(
                    ".sidebar-link"
                );



            sidebarLinks.forEach(link => {

                if (
                    link.dataset.page ===
                    currentPage
                ) {

                    link.classList.add(
                        "active"
                    );
                }
            });



            initializeLogout();
        }



        loadSidebar();

        function initializeLogout() {

            const logoutBtn =

                document.getElementById(
                    "logoutBtn"
                );



            if (!logoutBtn) {
                return;
            }



            logoutBtn.addEventListener(

                "click",

                function (e) {

                    e.preventDefault();



                    localStorage.removeItem(
                        "admin_token"
                    );



                    window.location.href =
                        "./login.html";
                }
            );
        }

    </script>
    <script>

        const currentPage =
            "dashboard";

    </script>
