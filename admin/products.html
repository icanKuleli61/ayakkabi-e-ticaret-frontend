<head>

    <style>
        .admin-topbar {

            margin-bottom: 30px;
        }



        .admin-page-title h3 {

            font-size: 34px;

            font-weight: 800;

            color: #111;

            margin-bottom: 8px;
        }



        .admin-page-title p {

            color: #888;

            margin: 0;

            font-size: 15px;
        }



        .admin-card {

            background: #fff;

            border-radius: 24px;

            padding: 30px;

            box-shadow:
                0 10px 35px rgba(0, 0, 0, 0.04);

            border: 1px solid #f1f1f1;
        }



        .admin-table {

            margin: 0;

            border-collapse: separate;

            border-spacing: 0 18px;
        }



        .admin-table thead tr {

            background: transparent;
        }



        .admin-table th {

            font-size: 14px;

            font-weight: 800;

            color: #999;

            border: none;

            padding: 0 20px 14px 20px;

            text-transform: uppercase;

            letter-spacing: 0.5px;
        }



        .admin-table tbody tr {

            background: #fff;

            transition: 0.25s;

            box-shadow:
                0 3px 12px rgba(0, 0, 0, 0.04);

            border-radius: 18px;
        }



        .admin-table tbody tr:hover {

            transform: translateY(-3px);

            box-shadow:
                0 10px 25px rgba(0, 0, 0, 0.07);
        }



        .admin-table td {

            vertical-align: middle;

            padding: 22px 20px;

            border: none;

            background: #fff;
        }



        .admin-table td:first-child {

            border-top-left-radius: 18px;

            border-bottom-left-radius: 18px;
        }



        .admin-table td:last-child {

            border-top-right-radius: 18px;

            border-bottom-right-radius: 18px;
        }


        .product-image-wrapper {

            width: 110px;

            height: 110px;

            background: #f8f8f8;

            border-radius: 24px;

            display: flex;

            align-items: center;

            justify-content: center;

            overflow: hidden;

            border: 1px solid #f1f1f1;
        }


        .product-image {

            width: 100%;

            height: 100%;

            object-fit: contain;
        }



        .product-name {

            font-size: 19px;

            font-weight: 800;

            color: #111;

            margin-bottom: 6px;

            line-height: 1.4;
        }



        .product-id {

            color: #999;

            font-size: 13px;

            font-weight: 600;
        }



        .brand-text {

            font-size: 16px;

            font-weight: 700;

            color: #444;
        }



        .variant-count {

            width: 42px;

            height: 42px;

            border-radius: 12px;

            background: #f5f5f5;

            display: flex;

            align-items: center;

            justify-content: center;

            font-weight: 800;

            color: #111;

            font-size: 15px;
        }



        .status-badge {

            display: inline-flex;

            align-items: center;

            justify-content: center;

            padding: 10px 18px;

            border-radius: 999px;

            font-size: 13px;

            font-weight: 800;
        }



        .status-active {

            background: #e7f8ef;

            color: #1f9d55;
        }



        .status-passive {

            background: #fff0f0;

            color: #ff4d4f;
        }



        .actions {

            display: flex;

            align-items: center;

            gap: 12px;
        }



        .action-btn {

            width: 44px;

            height: 44px;

            border-radius: 14px;

            border: none;

            cursor: pointer;

            display: flex;

            align-items: center;

            justify-content: center;

            transition: 0.2s;

            font-size: 18px;
        }



        .action-btn:hover {

            transform: translateY(-2px);
        }



        .btn-edit {

            background: #111;

            color: #fff;
        }



        .btn-passive {

            background: #fff4e5;

            color: #ff9800;
        }



        .btn-active {

            background: #e8f7ee;

            color: #1f9d55;
        }



        .product-info {

            display: flex;

            flex-direction: column;

            justify-content: center;

            gap: 6px;
        }


        .pagination-area {

            display: flex;

            justify-content: center;

            gap: 10px;

            margin-top: 35px;
        }



        .form-control {

            height: 56px;

            border-radius: 16px;

            border: 1px solid #eee;

            box-shadow: none;

            font-size: 15px;

            padding: 0 20px;
        }



        .form-control:focus {

            border-color: #111;

            box-shadow: none;
        }



        .site-btn {

            height: 56px;

            display: inline-flex;

            align-items: center;

            justify-content: center;

            padding: 0 28px;

            border-radius: 16px;

            font-size: 14px;

            font-weight: 800;

            letter-spacing: 0.5px;
        }
    </style>

                <!-- SAĞ PANEL -->

                <div class="col-lg-9">

                    <!-- TOP BAR -->

                    <div class="admin-topbar">

                        <div class="row align-items-center">

                            <!-- LEFT -->

                            <div class="col-lg-6">

                                <div class="admin-page-title">

                                    <h3>
                                        Ürün Yönetimi
                                    </h3>

                                    <p>
                                        Tüm ürünleri buradan yönetebilirsiniz.
                                    </p>

                                </div>

                            </div>

                            <!-- RIGHT -->

                            <div class="col-lg-6 text-right">

                                <a href="./product-create.html" class="site-btn">

                                </a>

                            </div>

                    <!-- FILTER BAR -->

                    <div class="admin-card mt-4">

                            <div class="col-lg-6">

                            </div>

                            <!-- STATUS -->

                            <div class="col-lg-3">

                                    <option value="">

                                    <option value="passive">

                                </select>

                            </div>

                            <!-- CATEGORY -->

                            <div class="col-lg-3">

                                <select class="form-control" id="categoryFilter">

                                    <option value="">

                                    </option>

                                </select>

                            </div>

                        </div>

                    </div>

                    <!-- PRODUCTS TABLE -->

                    <div class="admin-card mt-4">

                        <div class="table-responsive">

                            <table class="table admin-table">

                                <thead>

                                    <tr>

                                        <th>Görsel</th>

    <!-- Js Plugins -->
    <script src="../js/jquery-3.3.1.min.js"></script>

    <script src="../js/bootstrap.min.js"></script>

    <script src="../js/jquery.nice-select.min.js"></script>

    <script src="../js/jquery.nicescroll.min.js"></script>

    <script src="../js/jquery.magnific-popup.min.js"></script>

    <script src="../js/jquery.countdown.min.js"></script>

    <script src="../js/jquery.slicknav.js"></script>

    <script src="../js/mixitup.min.js"></script>

    <script src="../js/owl.carousel.min.js"></script>

    <script src="../js/main.js"></script>

    <script>

        const currentPage = "products";

        let products = [];



        document.addEventListener(

            "DOMContentLoaded",

            async function () {

                await initializePage();

            }
        );



        async function initializePage() {

            try {

                showLoader();

                await loadSidebar();

                await loadCategories();

                await fetchProducts();

                initializeFilters();

                hideLoader();

            } catch (error) {

                console.error(
                    "Sayfa yüklenirken hata oluştu:",
                    error
                );
            }
        }



        async function loadSidebar() {

            try {

                const response = await fetch(
                    "./sidebar.html"
                );



                if (!response.ok) {

                    throw new Error(
                        "Sidebar yüklenemedi"
                    );
                }



                const html =
                    await response.text();



                document.getElementById(
                    "sidebar-container"
                ).innerHTML = html;



                setActiveSidebar();

            } catch (error) {

                console.error(
                    "Sidebar hatası:",
                    error
                );
            }
        }



        function setActiveSidebar() {

            const sidebarLinks =

                document.querySelectorAll(
                    ".sidebar-link"
                );



            sidebarLinks.forEach(link => {

                link.classList.remove(
                    "active"
                );



                if (
                    link.dataset.page ===
                    currentPage
                ) {

                    link.classList.add(
                        "active"
                    );
                }
            });
        }


        async function loadCategories() {

            try {

                const response = await fetch(

                    "https://shoe-ecommerce-api.onrender.com/api/categories"
                );



                const result =
                    await response.json();



                const categoryFilter =

                    document.getElementById(
                        "categoryFilter"
                    );



                result.data.forEach(category => {

                    categoryFilter.innerHTML += `

                <option value="${category.id}">

                    ${category.name}

                </option>
            `;
                });



                $('#categoryFilter').niceSelect('update');

            } catch (error) {

                console.error(
                    "Kategoriler alınamadı:",
                    error
                );
            }
        }


        async function fetchProducts() {

            try {

                const token =
                    localStorage.getItem(
                        "admin_token"
                    );



                const search =

                    document.getElementById(
                        "searchInput"
                    ).value;



                const status =

                    document.getElementById(
                        "statusFilter"
                    ).value;



                const categoryId =

                    document.getElementById(
                        "categoryFilter"
                    ).value;



                const response = await fetch(

                    `https://shoe-ecommerce-api.onrender.com/api/admin/products/filter?search=${search}&status=${status}&category_id=${categoryId}`,

                    {

                        method: "GET",

                        headers: {

                            "Accept":
                                "application/json",

                            "Authorization":
                                `Bearer ${token}`
                        }
                    }
                );



                const result =
                    await response.json();



                products =
                    result.data.data
                    ?? result.data
                    ?? [];



                renderProducts();

            } catch (error) {

                console.error(
                    "Ürünler alınamadı:",
                    error
                );
            }
        }
        function initializeFilters() {

            const searchInput =

                document.getElementById(
                    "searchInput"
                );



            let searchTimeout;

            searchInput.addEventListener(

                "input",

                function () {

                    clearTimeout(
                        searchTimeout
                    );



                    searchTimeout = setTimeout(

                        async () => {

                            await fetchProducts();

                        },

                        500
                    );
                }
            );

            $('#statusFilter').on(

                'change',

                async function () {

                    await fetchProducts();
                }
            );

            $('#categoryFilter').on(

                'change',

                async function () {

                    await fetchProducts();
                }
            );
        }

        function renderProducts() {

            const tableBody =

                document.getElementById(
                    "productsTableBody"
                );



            if (!tableBody) {

                console.error(
                    "productsTableBody bulunamadı"
                );

                return;
            }



            tableBody.innerHTML = "";



            if (products.length === 0) {

                tableBody.innerHTML = `

                <tr>

                    <td colspan="7">

                        Ürün bulunamadı

                    </td>

                </tr>
            `;

                return;
            }



            products.forEach(product => {

                tableBody.innerHTML += `

                <tr>

                    <td>

                        <div class="product-image-wrapper">

                            <img
                                src="${product.image}"
                                class="product-image"
                            >

                        </div>

                    </td>
                    <td>

                        <div class="product-info">

                            <div class="product-name">

                                ${product.name}

                            </div>

                        </div>

                    </td>

                    <td>

                        ${product.brand ?? "-"}

                    </td>

                    <td>

                        ${product.variant_count}

                    </td>

                    <td>

                        ${product.status

                        ?

                        `<span class="status-badge status-active">
                                Aktif
                            </span>`

                        :

                        `<span class="status-badge status-passive">
                                Pasif
                            </span>`
                    }

                    </td>

                 <td>

    <div class="actions">

        <button
            class="action-btn btn-edit"
            onclick="goToEditPage(${product.id})"
        >
            <i class="fa fa-pencil"></i>
        </button>

        <button

            class="
                action-btn

                ${product.status
                        ? 'btn-passive'
                        : 'btn-active'}
            "

            onclick="
                toggleProductStatus(
                    ${product.id},
                    ${product.status}
                )
            "
        >

            ${product.status

                        ?

                        `<i class="fa fa-eye-slash"></i>`

                        :

                        `<i class="fa fa-eye"></i>`
                    }

        </button>

    </div>

</td>
                </tr>
            `;
            });
        }



        function goToEditPage(productId) {

            window.location.href =

                `./product-edit.html?id=${productId}`;
        }



        async function toggleProductStatus(
            productId,
            currentStatus
        ) {

            const actionText =

                currentStatus

                    ? "pasife çekmek"

                    : "yayına almak";



            const confirmed = confirm(

                `Ürünü ${actionText} istiyor musunuz?`
            );



            if (!confirmed) {
                return;
            }



            try {

                const token =
                    localStorage.getItem(
                        "admin_token"
                    );



                let url = "";

                let method = "";



                /*
                |--------------------------------------------------------------------------
                | ACTIVE -> PASSIVE
                |--------------------------------------------------------------------------
                */

                if (currentStatus) {

                    url =
                        `https://shoe-ecommerce-api.onrender.com/api/admin/products/${productId}`;

                    method = "DELETE";

                } else {

                    /*
                    |--------------------------------------------------------------------------
                    | PASSIVE -> ACTIVE
                    |--------------------------------------------------------------------------
                    */

                    url =
                        `https://shoe-ecommerce-api.onrender.com/api/admin/products/${productId}/restore`;

                    method = "PATCH";
                }



                const response = await fetch(

                    url,

                    {

                        method: method,

                        headers: {

                            "Accept":
                                "application/json",

                            "Authorization":
                                `Bearer ${token}`
                        }
                    }
                );



                const result =
                    await response.json();



                console.log(result);



                await fetchProducts();

            } catch (error) {

                console.error(
                    "Status değiştirilemedi:",
                    error
                );
            }
        }


        function showLoader() {

            document.getElementById(
                "profileLoader"
            ).style.display = "flex";



            document.getElementById(
                "profileContent"
            ).style.display = "none";
        }



        function hideLoader() {

            document.getElementById(
                "profileLoader"
            ).style.display = "none";



            document.getElementById(
                "profileContent"
            ).style.display = "block";
        }

    </script>
